models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the contents of both.txt
      - role: assistant
        content: I'll read the contents of both.txt for you.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading file contents"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/both.txt"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the contents of both.txt
      - role: assistant
        content: I'll read the contents of both.txt for you.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading file contents"}'
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/both.txt"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: 1. Testing both hooks!
      - role: assistant
        content: |-
          The file `both.txt` contains a single line:
          ```
          Testing both hooks!
          ```
