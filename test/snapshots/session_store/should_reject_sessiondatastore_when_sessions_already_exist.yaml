models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Hello
      - role: assistant
        content: |-
          Hello! I'm GitHub Copilot CLI, ready to help you with the GitHub Copilot SDK repository. 

          I can assist you with:
          - Building, testing, and linting across all language SDKs (Node.js, Python, Go, .NET)
          - Understanding the codebase architecture and JSON-RPC client implementation
          - Adding new SDK features or E2E tests
          - Running language-specific tasks or investigating issues

          What would you like to work on today?
