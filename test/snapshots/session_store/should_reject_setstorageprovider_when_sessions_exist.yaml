models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Hello
      - role: assistant
        content: >-
          Hello! I'm GitHub Copilot CLI, powered by claude-sonnet-4.5. I'm here to help you with software engineering
          tasks in this repository.


          I can see you're working in the **copilot-sdk/nodejs** directory, which is part of a monorepo that implements
          language SDKs for connecting to the Copilot CLI via JSON-RPC.


          How can I help you today? I can:

          - Build, test, or lint the codebase

          - Add new SDK features or E2E tests

          - Debug issues or investigate bugs

          - Explore the codebase structure

          - Generate types or run other scripts

          - And more!


          What would you like to work on?
